name: Reminder Rescan

on:
  schedule:
    # Daily 06:00 UTC. A full --write scan of a large store can exceed one run's
    # time budget; running daily (not weekly) lets consecutive runs RESUME via the
    # cached checkpoint and converge on a full cycle within a couple of days,
    # instead of a weekly run that only ever chips off one 5h chunk.
    # 4x/day. Each run resumes the prior checkpoint, so 4x5h = ~20h of probing/day
    # covers the ~525k store in ~1.1 days instead of ~4.5 at once-daily.
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

# Never let two rescans overlap -- they'd double the send rate and fight over the
# same checkpoint. A new scheduled run waits rather than starting concurrently.
concurrency:
  group: reminder-rescan
  cancel-in-progress: false

jobs:
  rescan:
    runs-on: ubuntu-latest
    # Under GitHub's 6h hard cap. The script's BACKFILL_MAX_MINUTES (below) is set
    # lower still, so it exits gracefully on its own well before this fires -- this
    # is only a failsafe.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Rolling-key cache so the checkpoint is actually MUTABLE across runs:
      #   key         = unique per run  -> the exact key never hits, so the post-step
      #                 ALWAYS writes a fresh cache entry at the end of the run.
      #   restore-keys= prefix          -> at start, restores the MOST RECENT prior
      #                 checkpoint. (A single static key would save once and then
      #                 cache-hit forever, never persisting later progress.)
      - name: Restore checkpoint
        uses: actions/cache@v4
        with:
          path: backfill-progress.json
          key: backfill-progress-${{ github.run_id }}
          restore-keys: |
            backfill-progress-

      # NOTE: no --restart -- we WANT it to resume from the restored checkpoint.
      # BACKFILL_MAX_MINUTES makes the script save + exit 0 before the job timeout,
      # so the cache post-step runs (a cancelled job would skip it).
      - name: Run backfill rescan (resumes from checkpoint)
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          BACKFILL_MAX_MINUTES: "300"
        run: node backfill.js --write
