name: New Player Discovery

on:
  schedule:
    # 20:30 UTC: this job's probe IS the new player's FIRST notification, so the
    # run time IS the delivery time. At "0 5" that meant ~3:24-4:48am Eastern,
    # because GitHub runs crons late (observed 2.4-2.8h drift). 20:30 lands it
    # 4:30pm ET if punctual, ~7pm ET if drifted -- evening either way.
    - cron: "30 20 * * *"
  workflow_dispatch: {}

concurrency:
  group: new-player-discovery
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore known-keys snapshot
        uses: actions/cache@v4
        with:
          path: known-keys.txt
          key: known-keys-${{ github.run_id }}
          restore-keys: |
            known-keys-
      - name: Discover + seed new players
        env:
          ROBLOX_API_KEY: ${{ secrets.ROBLOX_API_KEY }}
          DISCOVER_MAX_MINUTES: "300"
        run: node discover-new.js --write
